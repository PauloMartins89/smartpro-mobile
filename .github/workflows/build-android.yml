name: Build Android APK

on:
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: false
        default: 'preview'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: Configurar memória do Gradle
        run: |
          mkdir -p ~/.gradle
          echo "org.gradle.jvmargs=-Xmx4g -XX:MaxMetaspaceSize=512m -XX:+HeapDumpOnOutOfMemoryError" >> ~/.gradle/gradle.properties
          echo "org.gradle.daemon=false" >> ~/.gradle/gradle.properties
          echo "org.gradle.parallel=false" >> ~/.gradle/gradle.properties

      - name: Install dependencies (monorepo root)
        run: npm install --legacy-peer-deps

      - name: Build APK (local)
        working-directory: apps/smartlider
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        run: |
          npx eas build \
            --platform android \
            --profile ${{ github.event.inputs.profile || 'preview' }} \
            --local \
            --non-interactive \
            --output build.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: smartlider-apk-${{ github.run_number }}
          path: apps/smartlider/build.apk
          retention-days: 30
          if-no-files-found: error

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          DATE=$(date '+%d/%m/%Y %H:%M')
          # Remove release anterior se existir (tolerante a re-runs)
          gh release delete "build-${{ github.run_number }}" \
            --repo PauloMartins89/smartpro-mobile \
            --yes 2>/dev/null || true
          gh release create "build-${{ github.run_number }}" \
            apps/smartlider/build.apk#smartlider.apk \
            --repo PauloMartins89/smartpro-mobile \
            --title "SmartLider build ${{ github.run_number }}" \
            --notes "Build automático em $DATE" \
            --latest
