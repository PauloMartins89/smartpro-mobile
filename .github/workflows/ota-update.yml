name: OTA Update (sem novo APK)

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'apps/smartlider/app/**'
      - 'apps/smartlider/src/**'
      - 'apps/smartlider/assets/**'
      - 'apps/smartlider/package.json'

jobs:
  update:
    name: Publicar update OTA
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Instalar dependencias (monorepo root)
        run: npm ci --legacy-peer-deps

      - name: Instalar dependencias (smartlider)
        working-directory: apps/smartlider
        run: npm ci --legacy-peer-deps

      - name: Verificar autenticacao EAS
        working-directory: apps/smartlider
        run: npx eas-cli whoami
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Publicar OTA update
        working-directory: apps/smartlider
        run: |
          MSG="${{ github.event.head_commit.message }}"
          if [ -z "$MSG" ]; then MSG="OTA update auto"; fi
          npx eas-cli update --branch preview --environment preview --message "$MSG" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          EXPO_PUBLIC_SUPABASE_URL: "https://yfxkgwlxoszbapvgtpee.supabase.co"
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
